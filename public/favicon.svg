<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#0A2A0E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="100">
      <stop offset="0%" stop-color="#E8C547"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="flagGold" x1="0" y1="0" x2="100" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8C547"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="65%" stop-color="#f7f7f7"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Subtle ground curve -->
  <path d="M0 82 Q50 74 100 84 L100 100 L0 100 Z" fill="#0A2A0E" opacity="0.4"/>

  <!-- Golf ball -->
  <circle cx="34" cy="58" r="19" fill="url(#ballGrad)" stroke="#C9A84C" stroke-width="1.5"/>

  <!-- Golf ball dimples -->
  <g fill="#C9A84C" opacity="0.28">
    <circle cx="25" cy="50" r="2"/>
    <circle cx="33" cy="47" r="2"/>
    <circle cx="41" cy="50" r="2"/>
    <circle cx="23" cy="59" r="2"/>
    <circle cx="31" cy="57" r="2"/>
    <circle cx="39" cy="57" r="2"/>
    <circle cx="45" cy="59" r="2"/>
    <circle cx="25" cy="68" r="2"/>
    <circle cx="33" cy="68" r="2"/>
    <circle cx="41" cy="68" r="2"/>
    <circle cx="33" cy="60" r="2.5"/>
  </g>

  <!-- Flagstick / Pole -->
  <rect x="60" y="10" width="3.5" height="76" rx="1.75" fill="url(#goldGrad)"/>

  <!-- Flag pennant -->
  <path d="M62 12 Q78 14 90 10 L90 34 Q78 30 62 38 Z" fill="url(#flagGold)"/>

  <!-- "M" brand initial on flag -->
  <text x="74" y="28" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="13.5" font-weight="900" fill="#1B5E20" text-anchor="middle" dominant-baseline="central">M</text>
</svg>
